<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rfshop — Lookup Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #090b10;
    --surface: #0e1117;
    --border: #1e2535;
    --accent: #00f5c4;
    --accent2: #7b61ff;
    --text: #e8ecf4;
    --muted: #5a6480;
    --error: #ff4d6a;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,196,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,196,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* NOISE */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 0 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    text-decoration: none;
  }

  .logo span {
    color: var(--accent);
  }

  .badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    background: rgba(0,245,196,0.08);
    color: var(--accent);
    border: 1px solid rgba(0,245,196,0.2);
    padding: 4px 10px;
    border-radius: 100px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* HERO */
  .hero {
    padding: 80px 0 50px;
    text-align: center;
  }

  .hero-tag {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 24px;
    animation: fadeUp 0.6s ease forwards;
    opacity: 0;
  }

  .hero h1 {
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -2px;
    margin-bottom: 18px;
    animation: fadeUp 0.7s 0.1s ease forwards;
    opacity: 0;
  }

  .hero h1 em {
    font-style: normal;
    color: var(--accent);
  }

  .hero p {
    color: var(--muted);
    font-size: 1rem;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.7;
    animation: fadeUp 0.7s 0.2s ease forwards;
    opacity: 0;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px;
    margin: 40px 0 30px;
    animation: fadeUp 0.7s 0.3s ease forwards;
    opacity: 0;
  }

  .tab-btn {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .tab-btn svg { width: 15px; height: 15px; }

  .tab-btn.active {
    background: rgba(0,245,196,0.1);
    color: var(--accent);
    border: 1px solid rgba(0,245,196,0.2);
  }

  .tab-btn:hover:not(.active) {
    color: var(--text);
    background: rgba(255,255,255,0.04);
  }

  /* SEARCH BOX */
  .search-wrap {
    animation: fadeUp 0.7s 0.35s ease forwards;
    opacity: 0;
  }

  .search-box {
    display: flex;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px 8px 8px 20px;
    transition: border-color 0.25s;
  }

  .search-box:focus-within {
    border-color: rgba(0,245,196,0.4);
    box-shadow: 0 0 0 3px rgba(0,245,196,0.07);
  }

  .search-box input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
  }

  .search-box input::placeholder { color: var(--muted); }

  .search-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 12px 22px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .search-btn:hover {
    background: #00d4aa;
    transform: translateY(-1px);
  }

  .search-btn:active { transform: translateY(0); }

  .search-btn svg { width: 14px; height: 14px; }

  /* RESULT PANEL */
  .result-panel {
    margin-top: 28px;
    animation: fadeUp 0.5s ease forwards;
  }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .result-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .result-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }

  .dot.red { background: var(--error); box-shadow: 0 0 8px var(--error); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .result-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    transition: border-color 0.2s, transform 0.2s;
    animation: cardIn 0.4s ease forwards;
    opacity: 0;
  }

  .result-card:hover {
    border-color: rgba(0,245,196,0.25);
    transform: translateY(-2px);
  }

  .result-card.wide {
    grid-column: 1 / -1;
  }

  .card-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .card-value {
    font-family: 'Space Mono', monospace;
    font-size: 0.95rem;
    color: var(--text);
    word-break: break-all;
  }

  .card-value.accent { color: var(--accent); }
  .card-value.purple { color: var(--accent2); }

  .map-embed {
    width: 100%;
    height: 200px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #0a0e1a;
    overflow: hidden;
    margin-top: 12px;
    position: relative;
  }

  /* MAP PLACEHOLDER */
  .map-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .map-placeholder svg {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0; left: 0;
    opacity: 0.15;
  }

  .map-pin {
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .map-pin-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    margin: 0 auto 8px;
    box-shadow: 0 0 20px rgba(0,245,196,0.5);
    animation: mapBounce 1s ease;
  }

  @keyframes mapBounce {
    0% { transform: rotate(-45deg) translateY(-30px); opacity: 0; }
    60% { transform: rotate(-45deg) translateY(5px); }
    100% { transform: rotate(-45deg) translateY(0); opacity: 1; }
  }

  .map-coords {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 1px;
  }

  /* LOADING */
  .loading {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 30px;
    justify-content: center;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ERROR */
  .error-msg {
    background: rgba(255,77,106,0.08);
    border: 1px solid rgba(255,77,106,0.25);
    border-radius: 12px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    color: var(--error);
  }

  /* HISTORY */
  .history-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
    animation: fadeUp 0.7s 0.4s ease forwards;
    opacity: 0;
  }

  .history-chip {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 5px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .history-chip:hover {
    border-color: rgba(0,245,196,0.3);
    color: var(--accent);
    background: rgba(0,245,196,0.05);
  }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 30px 0;
    margin-top: 80px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  footer span {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* HIDDEN */
  .hidden { display: none; }

  /* PANEL sections */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* DISCORD extras */
  .discord-avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 3px solid var(--accent2);
    object-fit: cover;
  }

  .avatar-placeholder {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--accent2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    font-weight: 800;
    color: #fff;
    border: 3px solid var(--accent2);
    box-shadow: 0 0 20px rgba(123,97,255,0.4);
  }

  .discord-name-block {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 4px;
  }

  .discord-tag {
    font-size: 1.2rem;
    font-weight: 800;
  }

  .discord-sub {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .badge-nitro {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(123,97,255,0.15);
    border: 1px solid rgba(123,97,255,0.3);
    color: var(--accent2);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    padding: 3px 10px;
    border-radius: 100px;
    letter-spacing: 1px;
  }

  @media(max-width: 600px) {
    .hero h1 { font-size: 2rem; }
    .tab-btn span { display: none; }
  }
</style>
</head>
<body>

<div class="container">
  <nav>
    <a href="#" class="logo">rf<span>shop</span></a>
    <span class="badge">LOOKUP TOOL</span>
  </nav>

  <section class="hero">
    <div class="hero-tag">— Intelligence Tool —</div>
    <h1>Lookup <em>anything.</em><br>Instantly.</h1>
    <p>Recherche d'informations sur des IPs, comptes Discord, usernames et plus encore via des APIs publiques.</p>
  </section>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('ip', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <span>IP Lookup</span>
    </button>
    <button class="tab-btn" onclick="switchTab('discord', this)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057.101 18.081.11 18.105.127 18.12a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
      <span>Discord</span>
    </button>
    <button class="tab-btn" onclick="switchTab('username', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Username</span>
    </button>
  </div>

  <!-- IP TAB -->
  <div id="tab-ip" class="tab-content active">
    <div class="search-wrap">
      <div class="search-box">
        <input type="text" id="ip-input" placeholder="ex: 8.8.8.8" autocomplete="off" spellcheck="false" onkeydown="if(event.key==='Enter')lookupIP()">
        <button class="search-btn" onclick="lookupIP()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Lookup
        </button>
      </div>
    </div>
    <div class="history-bar" id="ip-history"></div>
    <div id="ip-result"></div>
  </div>

  <!-- DISCORD TAB -->
  <div id="tab-discord" class="tab-content">
    <div class="search-wrap">
      <div class="search-box">
        <input type="text" id="discord-input" placeholder="Discord User ID (ex: 123456789012345678)" autocomplete="off" spellcheck="false" onkeydown="if(event.key==='Enter')lookupDiscord()">
        <button class="search-btn" onclick="lookupDiscord()" style="background:#7b61ff;color:#fff;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Lookup
        </button>
      </div>
    </div>
    <div class="history-bar" id="discord-history"></div>
    <div id="discord-result"></div>
  </div>

  <!-- USERNAME TAB -->
  <div id="tab-username" class="tab-content">
    <div class="search-wrap">
      <div class="search-box">
        <input type="text" id="username-input" placeholder="ex: johndoe" autocomplete="off" spellcheck="false" onkeydown="if(event.key==='Enter')lookupUsername()">
        <button class="search-btn" onclick="lookupUsername()" style="background:linear-gradient(135deg,#7b61ff,#00f5c4);color:#000;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Lookup
        </button>
      </div>
    </div>
    <div class="history-bar" id="username-history"></div>
    <div id="username-result"></div>
  </div>

  <footer>
    <span>rfshop © 2025</span>
    <span>ipapi.co · freeipapi · discord · github</span>
  </footer>
</div>

<script>
// ── UTILS ──────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const history = { ip: [], discord: [], username: [] };

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  $(`tab-${tab}`).classList.add('active');
}

function saveHistory(type, val) {
  if (!val || history[type].includes(val)) return;
  history[type].unshift(val);
  if (history[type].length > 5) history[type].pop();
  renderHistory(type);
}

function renderHistory(type) {
  const el = $(`${type}-history`);
  el.innerHTML = history[type].map(v =>
    `<span class="history-chip" onclick="loadHistory('${type}','${v}')">${v}</span>`
  ).join('');
}

function loadHistory(type, val) {
  $(`${type}-input`).value = val;
  if (type === 'ip') lookupIP();
  if (type === 'discord') lookupDiscord();
  if (type === 'username') lookupUsername();
}

function setLoading(el) {
  $(el).innerHTML = `<div class="loading"><div class="spinner"></div>Analyse en cours...</div>`;
}

function setError(el, msg) {
  $(el).innerHTML = `<div class="error-msg">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    ${msg}
  </div>`;
}

function card(label, value, cls = '') {
  return `<div class="result-card"><div class="card-label">${label}</div><div class="card-value ${cls}">${value || '—'}</div></div>`;
}

function flagEmoji(code) {
  if (!code) return '';
  return code.toUpperCase().replace(/./g, c => String.fromCodePoint(0x1F1E0 - 65 + c.charCodeAt(0)));
}

// ── IP LOOKUP — HTTPS only, no key needed ───────────────────
async function tryFetch(url, parse) {
  try {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 7000);
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(tid);
    if (!r.ok) return null;
    const j = await r.json();
    return parse(j);
  } catch(_) { return null; }
}

async function fetchIPData(ip) {
  const strategies = [
    // 1. ipapi.co — HTTPS natif, CORS ouvert
    () => tryFetch(
      `https://ipapi.co/${ip}/json/`,
      d => !d.error && d.latitude ? {
        ip:d.ip, country:d.country_name, countryCode:d.country_code,
        region:d.region, city:d.city, postal:d.postal,
        lat:d.latitude, lon:d.longitude, timezone:d.timezone,
        isp:d.org, org:d.org, asn:d.asn, ok:true
      } : null
    ),
    // 2. freeipapi.com — HTTPS, CORS ouvert, gratuit
    () => tryFetch(
      `https://freeipapi.com/api/json/${ip}`,
      d => d.ipAddress ? {
        ip:d.ipAddress, country:d.countryName, countryCode:d.countryCode,
        region:d.regionName, city:d.cityName, postal:d.zipCode,
        lat:d.latitude, lon:d.longitude, timezone:d.timeZone,
        isp:d.isp||null, org:null, asn:null, ok:true
      } : null
    ),
    // 3. ipwho.is — HTTPS, CORS ouvert
    () => tryFetch(
      `https://ipwho.is/${ip}`,
      d => d.success ? {
        ip:d.ip, country:d.country, countryCode:d.country_code,
        region:d.region, city:d.city, postal:d.postal,
        lat:d.latitude, lon:d.longitude, timezone:d.timezone?.id||null,
        isp:d.connection?.isp||null, org:d.connection?.org||null,
        asn:d.connection?.asn ? 'AS'+d.connection.asn : null, ok:true
      } : null
    ),
    // 4. ip.guide — HTTPS, pas de clé
    () => tryFetch(
      `https://ip.guide/${ip}`,
      d => d.location ? {
        ip:d.ip||ip, country:d.location.country_name, countryCode:d.location.country_code,
        region:d.location.region_name, city:d.location.city,
        postal:d.location.zip_code, lat:d.location.latitude, lon:d.location.longitude,
        timezone:d.location.time_zone, isp:d.network?.autonomous_system?.organization||null,
        org:d.network?.autonomous_system?.organization||null,
        asn:d.network?.autonomous_system?.asn ? 'AS'+d.network.autonomous_system.asn : null, ok:true
      } : null
    ),
  ];

  for (const fn of strategies) {
    const r = await fn();
    if (r?.ok) return r;
  }
  return { ok: false };
}

async function lookupIP() {
  let ip = $('ip-input').value.trim();
  if (!ip) { setError('ip-result', 'Entre une adresse IP valide.'); return; }
  setLoading('ip-result');
  saveHistory('ip', ip);

  const d = await fetchIPData(ip);
  if (!d.ok) {
    setError('ip-result', 'IP introuvable ou toutes les APIs sont inaccessibles depuis ce réseau.');
    return;
  }

  const lat = d.lat, lon = d.lon;
  const cx = ((lon + 180) / 360 * 800).toFixed(0);
  const cy = ((90 - lat) / 180 * 400).toFixed(0);

  $('ip-result').innerHTML = `
    <div class="result-panel">
      <div class="result-header">
        <span class="result-title">// IP Intelligence</span>
        <span class="result-status"><span class="dot"></span>${d.ip}</span>
      </div>
      <div class="result-grid">
        ${card('Adresse IP', d.ip, 'accent')}
        ${card('Pays', `${flagEmoji(d.countryCode)} ${d.country}`)}
        ${card('Région', d.region)}
        ${card('Ville', d.city)}
        ${card('Code postal', d.postal)}
        ${card('Fuseau horaire', d.timezone)}
        ${card('ISP', d.isp)}
        ${card('Organisation', d.org)}
        ${card('ASN', d.asn)}
        <div class="result-card wide">
          <div class="card-label">Localisation — ${lat.toFixed(4)}°, ${lon.toFixed(4)}°</div>
          <div style="height:180px;background:#0a0e1a;border-radius:8px;border:1px solid var(--border);margin-top:8px;overflow:hidden;position:relative;">
            <svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
              <defs>
                <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
                  <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f5c4" stroke-width="0.4"/>
                </pattern>
              </defs>
              <rect width="100%" height="100%" fill="url(#g)"/>
              <circle cx="${cx}" cy="${cy}" r="6" fill="#00f5c4" opacity="0.95"/>
              <circle cx="${cx}" cy="${cy}" r="0" fill="none" stroke="#00f5c4" stroke-width="2" opacity="0.7">
                <animate attributeName="r" values="6;40" dur="2.5s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.7;0" dur="2.5s" repeatCount="indefinite"/>
              </circle>
            </svg>
            <div style="position:absolute;bottom:10px;right:14px;font-family:'Space Mono',monospace;font-size:0.68rem;color:var(--accent);">${lat.toFixed(4)}°N ${lon.toFixed(4)}°E</div>
          </div>
        </div>
      </div>
    </div>`;
  animateCards();
}

// ── DISCORD LOOKUP ─────────────────────────────────────────
async function lookupDiscord() {
  const id = $('discord-input').value.trim();
  if (!id || !/^\d{17,20}$/.test(id)) { setError('discord-result', 'ID Discord invalide (17-20 chiffres).'); return; }
  setLoading('discord-result');
  saveHistory('discord', id);

  // Snowflake decode
  const epoch = 1420070400000n;
  const snowflake = BigInt(id);
  const timestamp = new Date(Number((snowflake >> 22n) + epoch));
  const workerID = (snowflake & 0x3E0000n) >> 17n;
  const processID = (snowflake & 0x1F000n) >> 12n;
  const increment = snowflake & 0xFFFn;

  // Run both APIs in parallel
  let lanyardData = null;
  let discordProfile = null;

  await Promise.allSettled([
    // Lanyard — status, presence, guilds
    fetch(`https://api.lanyard.rest/v1/users/${id}`)
      .then(r => r.ok ? r.json() : null)
      .then(j => { if (j?.success) lanyardData = j.data; }),
    // discord.id public lookup (no auth, returns basic profile + banner)
    fetch(`https://discord.id/api/fetch/?q=${id}`)
      .then(r => r.ok ? r.json() : null)
      .then(j => { if (j) discordProfile = j; }),
  ]);

  const user = lanyardData?.discord_user || discordProfile || {};
  const username  = user.username || discordProfile?.tag?.split('#')[0] || null;
  const globalName = user.global_name || discordProfile?.global_name || username;
  const discriminator = user.discriminator;
  const avatarHash = user.avatar || discordProfile?.avatar;
  const bannerHash = user.banner || discordProfile?.banner;
  const accentColor = user.accent_color || discordProfile?.accent_color;

  const avatarUrl = avatarHash
    ? `https://cdn.discordapp.com/avatars/${id}/${avatarHash}.${avatarHash.startsWith('a_') ? 'gif' : 'png'}?size=256`
    : `https://cdn.discordapp.com/embed/avatars/${Number(id) % 5}.png`;

  const bannerUrl = bannerHash
    ? `https://cdn.discordapp.com/banners/${id}/${bannerHash}.${bannerHash.startsWith('a_') ? 'gif' : 'png'}?size=600`
    : null;

  const status = lanyardData?.discord_status;
  const statusColors = { online: '#43b581', idle: '#faa61a', dnd: '#f04747', offline: '#747f8d' };
  const statusLabels = { online: '🟢 En ligne', idle: '🟡 Inactif', dnd: '🔴 Ne pas déranger', offline: '⚫ Hors ligne' };

  const guilds = lanyardData?.guilds || [];
  const activities = lanyardData?.activities || [];

  const accentHex = accentColor ? '#' + accentColor.toString(16).padStart(6, '0') : 'var(--accent2)';

  $('discord-result').innerHTML = `
    <div class="result-panel">
      <div class="result-header">
        <span class="result-title">// Discord Intelligence</span>
        <span class="result-status"><span class="dot" style="background:var(--accent2);box-shadow:0 0 8px var(--accent2)"></span>${id}</span>
      </div>
      <div class="result-grid">

        <!-- PROFILE CARD -->
        <div class="result-card wide" style="padding:0;overflow:hidden;border-color:rgba(123,97,255,0.3)">
          <!-- BANNER -->
          <div style="height:120px;background:${bannerUrl ? 'transparent' : accentHex};position:relative;overflow:hidden;">
            ${bannerUrl
              ? `<img src="${bannerUrl}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.style.background='${accentHex}'">`
              : `<div style="width:100%;height:100%;background:linear-gradient(135deg,${accentHex}88,#090b10)"></div>`}
          </div>
          <!-- AVATAR + INFO -->
          <div style="padding:0 22px 22px;position:relative;margin-top:-42px;">
            <div style="display:flex;align-items:flex-end;gap:16px;margin-bottom:14px;">
              <img src="${avatarUrl}" style="width:80px;height:80px;border-radius:50%;border:4px solid #0e1117;box-shadow:0 0 0 3px ${accentHex}60;flex-shrink:0" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
              <div style="padding-bottom:4px">
                <div style="font-size:1.3rem;font-weight:800;line-height:1.1">${globalName || username || 'Inconnu'}</div>
                ${username ? `<div style="font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--muted)">@${username}${discriminator && discriminator !== '0' ? '#'+discriminator : ''}</div>` : ''}
                ${status ? `<div style="margin-top:5px;font-family:'Space Mono',monospace;font-size:0.72rem;color:${statusColors[status]}">${statusLabels[status]}</div>` : ''}
              </div>
            </div>
            ${activities.length ? `<div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-top:4px">
              <div style="font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">Activité</div>
              ${activities.slice(0,2).map(a => `<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
                ${a.assets?.large_image ? `<img src="https://cdn.discordapp.com/app-assets/${a.application_id}/${a.assets.large_image}.png" style="width:32px;height:32px;border-radius:5px" onerror="this.style.display='none'">` : ''}
                <div>
                  <div style="font-size:0.82rem;font-weight:600">${a.name}</div>
                  ${a.details ? `<div style="font-family:'Space Mono',monospace;font-size:0.68rem;color:var(--muted)">${a.details}</div>` : ''}
                </div>
              </div>`).join('')}
            </div>` : ''}
          </div>
        </div>

        ${card('User ID', id, 'purple')}
        ${card('Compte créé', timestamp.toLocaleDateString('fr-FR', {day:'2-digit',month:'long',year:'numeric'}))}
        ${card('Heure création', timestamp.toLocaleTimeString('fr-FR'))}
        ${card('Worker ID', workerID.toString())}
        ${card('Process ID', processID.toString())}
        ${card('Increment', increment.toString())}
        ${accentColor ? card('Couleur accent', `<span style="display:inline-flex;align-items:center;gap:8px"><span style="width:14px;height:14px;border-radius:50%;background:${accentHex};display:inline-block"></span>${accentHex}</span>`) : ''}

        <!-- SERVEURS LANYARD -->
        ${guilds.length ? `<div class="result-card wide">
          <div class="card-label" style="margin-bottom:12px">Serveurs Discord (via Lanyard)</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            ${guilds.slice(0, 20).map(g => {
              const icon = g.icon
                ? `<img src="https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png?size=32" style="width:32px;height:32px;border-radius:8px;flex-shrink:0" onerror="this.style.background='#2d2f36'">`
                : `<div style="width:32px;height:32px;border-radius:8px;background:var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:800">${(g.name||'?')[0]}</div>`;
              return `<div style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:6px 12px 6px 6px;font-size:0.78rem;max-width:220px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis" title="${g.name}">
                ${icon}
                <span style="overflow:hidden;text-overflow:ellipsis">${g.name || g.id}</span>
              </div>`;
            }).join('')}
          </div>
          ${guilds.length > 20 ? `<div style="margin-top:10px;font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--muted)">+${guilds.length-20} autres serveurs</div>` : ''}
        </div>` : `<div class="result-card wide" style="border-color:rgba(123,97,255,0.15)">
          <div class="card-label">Serveurs Discord</div>
          <div style="font-family:'Space Mono',monospace;font-size:0.78rem;color:var(--muted);margin-top:8px">
            Non disponible — l'utilisateur doit utiliser 
            <a href="https://lanyard.rest" target="_blank" style="color:var(--accent2);text-decoration:none">Lanyard</a> 
            pour exposer ses serveurs publiquement.
          </div>
        </div>`}

      </div>
    </div>`;
  animateCards();
}

// ── USERNAME LOOKUP ────────────────────────────────────────
const platforms = [
  { name: 'GitHub', url: 'https://github.com/', api: id => fetch(`https://api.github.com/users/${id}`) },
  { name: 'Reddit', url: 'https://reddit.com/u/', api: id => fetch(`https://www.reddit.com/user/${id}/about.json`) },
  { name: 'Twitter/X', url: 'https://x.com/', api: null },
  { name: 'Instagram', url: 'https://instagram.com/', api: null },
  { name: 'TikTok', url: 'https://tiktok.com/@', api: null },
  { name: 'Twitch', url: 'https://twitch.tv/', api: null },
  { name: 'YouTube', url: 'https://youtube.com/@', api: null },
  { name: 'Steam', url: 'https://steamcommunity.com/id/', api: null },
];

async function lookupUsername() {
  const username = $('username-input').value.trim();
  if (!username) { setError('username-result', 'Entre un nom d\'utilisateur.'); return; }
  setLoading('username-result');
  saveHistory('username', username);

  let githubData = null;
  let redditData = null;

  try { const g = await fetch(`https://api.github.com/users/${username}`); if(g.ok) githubData = await g.json(); } catch(_){}
  try { const r = await fetch(`https://www.reddit.com/user/${username}/about.json`); if(r.ok) { const rd = await r.json(); redditData = rd.data; } } catch(_){}

  const cards = platforms.map(p => {
    const url = p.url + (p.name === 'TikTok' ? username : username);
    return `<div class="result-card" style="cursor:pointer" onclick="window.open('${url+username.replace('https://tiktok.com/@','')}','_blank')">
      <div class="card-label">${p.name}</div>
      <div class="card-value" style="font-size:0.8rem;color:var(--muted)">${url}${username}</div>
    </div>`;
  }).join('');

  let extra = '';
  if (githubData) {
    extra += `<div class="result-card wide" style="border-color:rgba(0,245,196,0.2)">
      <div class="card-label">GitHub ✓ Profil trouvé</div>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:12px">
        ${githubData.avatar_url ? `<img src="${githubData.avatar_url}" style="width:48px;height:48px;border-radius:50%;border:2px solid var(--accent)">` : ''}
        <div>
          <div style="font-weight:800">${githubData.name || githubData.login}</div>
          <div style="font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--muted)">${githubData.bio || ''}</div>
        </div>
      </div>
      <div style="display:flex;gap:16px;font-family:'Space Mono',monospace;font-size:0.75rem">
        <span style="color:var(--accent)">${githubData.public_repos} repos</span>
        <span style="color:var(--muted)">${githubData.followers} followers</span>
        <span style="color:var(--muted)">${githubData.following} following</span>
      </div>
      ${githubData.location ? `<div style="margin-top:8px;font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--muted)">📍 ${githubData.location}</div>` : ''}
    </div>`;
  }

  if (redditData) {
    const created = new Date(redditData.created_utc * 1000);
    extra += `<div class="result-card wide" style="border-color:rgba(255,69,0,0.2)">
      <div class="card-label">Reddit ✓ Profil trouvé</div>
      <div style="font-weight:800;margin-bottom:8px">u/${redditData.name}</div>
      <div style="display:flex;gap:16px;font-family:'Space Mono',monospace;font-size:0.75rem">
        <span style="color:#ff4500">${(redditData.link_karma||0).toLocaleString()} karma posts</span>
        <span style="color:var(--muted)">${(redditData.comment_karma||0).toLocaleString()} karma comm.</span>
      </div>
      <div style="margin-top:8px;font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--muted)">Inscrit: ${created.toLocaleDateString('fr-FR')}</div>
    </div>`;
  }

  $('username-result').innerHTML = `
    <div class="result-panel">
      <div class="result-header">
        <span class="result-title">// Username Intelligence</span>
        <span class="result-status"><span class="dot" style="background:#7b61ff;box-shadow:0 0 8px #7b61ff"></span>${username}</span>
      </div>
      <div class="result-grid">
        ${extra}
        ${cards}
      </div>
    </div>`;
  animateCards();
}

function animateCards() {
  document.querySelectorAll('.result-card').forEach((c, i) => {
    c.style.animationDelay = `${i * 0.05}s`;
  });
}
</script>
